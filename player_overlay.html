<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선수 오버레이</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Jua&family=Nanum+Gothic:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
    /* 화면 전체를 좌표계로 사용. 크기는 vw(화면폭 비율)로 지정 → 어떤 브라우저·해상도든 동일 비율 */
    #stage { position: fixed; inset: 0; }
    .slot {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center;
      opacity: 0; transition: opacity 0.25s ease;
      will-change: opacity;
    }
    .slot.on { opacity: 1; }
    .slot .posbadge {
      margin-bottom: 6px; padding: 3px 12px; border-radius: 6px; font-weight: 800;
      white-space: nowrap; line-height: 1.1; text-shadow: 0 2px 5px rgba(0,0,0,0.7);
      letter-spacing: 0.5px;
    }
    .slot .avatar {
      width: 100%; aspect-ratio: 1/1; border-radius: 14px; overflow: hidden;
      background: #0d1017; box-shadow: 0 6px 22px rgba(0,0,0,0.55);
      border: 3px solid #fff;
    }
    .slot .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .slot .avatar .empty { width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#556; font-size:13px; }
    .slot .nameplate {
      margin-top: 8px; padding: 5px 14px; border-radius: 8px; font-weight: 800;
      white-space: nowrap; line-height: 1.15; text-shadow: 0 2px 6px rgba(0,0,0,0.75);
    }
    .gtitle {
      position: absolute;
      transform: translate(-50%, -100%);
      padding: 6px 22px; border-radius: 10px; font-weight: 800;
      white-space: nowrap; line-height: 1.15; text-shadow: 0 2px 6px rgba(0,0,0,0.75);
      opacity: 0; transition: opacity 0.25s ease; will-change: opacity;
    }
    .gtitle.on { opacity: 1; }
  </style>
</head>
<body>
  <div id="stage">
    <div class="gtitle" id="gtitleLeft"></div>
    <div class="gtitle" id="gtitleRight"></div>
  </div>
  <div id="diag" style="position:fixed;top:8px;right:8px;background:rgba(0,0,0,.8);color:#0f0;font:bold 20px monospace;padding:8px 12px;border-radius:6px;z-index:9999;white-space:pre;"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    // ===== 선수 오버레이 v4 (포지션 배지: 사진 위 포지션 / 아래 이름) =====
    // 코트 번호: URL 뒤에 ?court=2 붙이면 2코트. 기본 1.
    const courtNumber = new URLSearchParams(location.search).get('court') || '1';
    const courtPath = 'court' + courtNumber;

    const firebaseConfig = {
      apiKey: "AIzaSyAOIaiDKckDVDvDKe9qPURRWQqIsA7f1bs",
      authDomain: "scoreboard-3681d.firebaseapp.com",
      databaseURL: "https://scoreboard-3681d-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "scoreboard-3681d",
      storageBucket: "scoreboard-3681d.firebasestorage.app",
      messagingSenderId: "466288006612",
      appId: "1:466288006612:web:01d167367672c72a73b241"
    };
    firebase.initializeApp(firebaseConfig);
    const playersRef = firebase.database().ref(courtPath + '/players');  // 코트별: slots/titles/layout
    const sharedRef  = firebase.database().ref('shared');                // 공유: roster/teams

    const DEFAULT_STYLE = { x:50, y:70, size:150, font:22, family:"'Noto Sans KR',sans-serif", textColor:'#ffffff', plateColor:'#0a0c11', plateAlpha:62, borderColor:'#ffffff' };
    // 포지션(슬롯 고정): 좌0~3, 우4~7
    const POS_NAME = ['우수비','좌수비','세터','공격수', '공격수','세터','좌수비','우수비'];
    const stage = document.getElementById('stage');
    const titleEls = { left: document.getElementById('gtitleLeft'), right: document.getElementById('gtitleRight') };
    let els = []; // 8개 슬롯 DOM 캐시

    // 슬롯 DOM 8개를 미리 생성 (재생성 안 하고 갱신만 → 깜빡임 없음)
    for (let i = 0; i < 8; i++) {
      const el = document.createElement('div');
      el.className = 'slot';
      el.innerHTML = `<div class="posbadge"></div><div class="avatar"><img alt=""><div class="empty" style="display:none"></div></div><div class="nameplate"></div>`;
      stage.appendChild(el);
      els.push({
        root: el,
        badge: el.querySelector('.posbadge'),
        avatar: el.querySelector('.avatar'),
        img: el.querySelector('img'),
        empty: el.querySelector('.empty'),
        plate: el.querySelector('.nameplate'),
        lastPhoto: null
      });
    }

    function hexToRgba(hex, alpha){
      const h = (hex||'#000000').replace('#','');
      const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
      return `rgba(${r},${g},${b},${(alpha==null?100:alpha)/100})`;
    }

    // 공유 roster + 코트별 slots/titles 를 각각 받아 합쳐서 렌더
    let sharedRoster = {};   // 공유 선수 명단
    let courtData = {};      // 코트별 slots/titles

    const BROADCAST_W = 1920, BROADCAST_H = 1080;
    // 1920px 기준값 → 화면폭 비율(vw)로 변환하는 헬퍼
    const toVw = px => (px / BROADCAST_W * 100) + 'vw';

    // ===== 진단: 실제 렌더 크기 표시 (문제 확인 후 이 블록만 지우면 됨) =====
    function updateDiag(){
      const d = document.getElementById('diag');
      if (!d) return;
      const sample = els[0] && els[0].root.classList.contains('on') ? els[0].avatar.getBoundingClientRect().width : 0;
      d.textContent =
        '화면: ' + window.innerWidth + ' x ' + window.innerHeight + '\n' +
        'devicePixelRatio: ' + window.devicePixelRatio + '\n' +
        '사진 실제폭: ' + Math.round(sample) + 'px';
    }
    window.addEventListener('resize', updateDiag);

    sharedRef.on('value', snap => { sharedRoster = (snap.val() || {}).roster || {}; render(); });
    playersRef.on('value', snap => { courtData = snap.val() || {}; render(); });

    function render(){
      const data = courtData;
      const roster = sharedRoster;
      const slots = (data.slots && data.slots.length === 8) ? data.slots : [];

      for (let i = 0; i < 8; i++) {
        const e = els[i];
        const s = slots[i];
        if (!s || !s.visible || !s.playerId) { e.root.classList.remove('on'); continue; }

        const p = roster[s.playerId];
        const st = { ...DEFAULT_STYLE, ...(s.style || {}) };

        // 위치는 %(화면 비율), 크기는 vw(화면폭 비율) → 어떤 브라우저·해상도든 미리보기와 동일 비율
        e.root.style.left = st.x + '%';
        e.root.style.top = st.y + '%';
        e.root.style.width = toVw(st.size);
        e.avatar.style.borderColor = st.borderColor;

        // 사진 (URL이 같으면 다시 로드하지 않음 → 캐시 유지, 깜빡임 없음)
        const photo = p && p.photo ? p.photo : '';
        if (photo !== e.lastPhoto) {
          e.lastPhoto = photo;
          if (photo) { e.img.src = photo; e.img.style.display = 'block'; e.empty.style.display = 'none'; }
          else { e.img.removeAttribute('src'); e.img.style.display = 'none'; e.empty.style.display = 'flex'; e.empty.textContent = p ? p.name : ''; }
        }

        // 포지션 배지 (사진 위, 슬롯 고정)
        e.badge.textContent = POS_NAME[i];
        e.badge.style.fontSize = toVw(st.font * 0.72);
        e.badge.style.color = st.textColor;
        e.badge.style.fontFamily = st.family;
        e.badge.style.background = hexToRgba(st.plateColor, st.plateAlpha);

        // 이름표 (사진 아래)
        e.plate.textContent = p ? (p.name || '') : '';
        e.plate.style.fontSize = toVw(st.font);
        e.plate.style.color = st.textColor;
        e.plate.style.fontFamily = st.family;
        e.plate.style.background = hexToRgba(st.plateColor, st.plateAlpha);

        e.root.classList.add('on');
      }

      // ===== 그룹 팀명 (각 그룹 상단 중앙) =====
      const titles = data.titles || {};
      const commonStyle = { ...DEFAULT_STYLE, ...((slots[0] && slots[0].style) || {}) };
      renderTitle('left',  [0,1,2,3], slots, roster, titles.left,  commonStyle);
      renderTitle('right', [4,5,6,7], slots, roster, titles.right, commonStyle);
      updateDiag();
    }

    function renderTitle(side, idxs, slots, roster, cfg, st){
      const el = titleEls[side];
      cfg = cfg || {};
      const text = (cfg.text && cfg.text.trim()) || (cfg.auto && cfg.auto.trim()) || '';
      // 이 그룹에서 실제로 보이는 슬롯만 대상
      const shown = idxs.filter(i => {
        const s = slots[i];
        return s && s.visible && s.playerId && roster[s.playerId];
      });
      if (!cfg.show || !text || shown.length === 0) { el.classList.remove('on'); return; }

      // 그룹 가로 중앙 = 보이는 슬롯 x의 (min+max)/2, 상단 = 최소 y에서 사진 절반만큼 위
      let minX = 100, maxX = 0, minY = 100, sizeAtTop = st.size;
      shown.forEach(i => {
        const s = { ...DEFAULT_STYLE, ...(slots[i].style || {}) };
        if (s.x < minX) minX = s.x;
        if (s.x > maxX) maxX = s.x;
        if (s.y < minY) { minY = s.y; sizeAtTop = s.size; }
      });
      const cx = (minX + maxX) / 2;
      // 사진 위쪽 경계 = y% - (사진높이 절반). 좌표계는 1920x1080 고정.
      const stageH = 1080;
      const halfPhotoPct = ((sizeAtTop / 2) / stageH) * 100;
      // 포지션 배지(우수비 등)가 사진 위에 있으므로 그 높이만큼은 항상 비켜줌
      const badgeH = st.font * 0.72;            // 배지 글자크기
      const badgePad = 6 + 6;                    // 배지 상하 패딩+아래 여백(대략)
      const badgeBlockPct = ((badgeH + badgePad) / stageH) * 100;
      // 사용자 조절 간격 (기본 12px) — 배지 위에서 팀명까지 추가 거리
      const userGapPx = (cfg.gap != null ? cfg.gap : 12);
      const userGapPct = (userGapPx / stageH) * 100;
      const topY = minY - halfPhotoPct - badgeBlockPct - userGapPct;

      // 팀명 배경색: 별도 지정(cfg.bg) 있으면 그걸, 없으면 공통 배경 사용
      const titleBg = cfg.bg || st.plateColor;
      const titleAlpha = (cfg.bgAlpha != null ? cfg.bgAlpha : st.plateAlpha);

      el.textContent = text;
      el.style.left = cx + '%';
      el.style.top = topY + '%';
      el.style.fontSize = toVw(st.font * 1.25);
      el.style.color = st.textColor;
      el.style.fontFamily = st.family;
      el.style.background = hexToRgba(titleBg, titleAlpha);
      el.style.border = '2px solid ' + st.borderColor;
      el.classList.add('on');
    }
  </script>
</body>
</html>
