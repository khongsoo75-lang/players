<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선수 오버레이</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Jua&family=Nanum+Gothic:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
    #stage { position: fixed; inset: 0; }
    .slot {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center;
      opacity: 0; transition: opacity 0.25s ease;
      will-change: opacity;
    }
    .slot.on { opacity: 1; }
    .slot .posbadge {
      margin-bottom: 6px; padding: 3px 12px; border-radius: 6px; font-weight: 800;
      white-space: nowrap; line-height: 1.1; text-shadow: 0 2px 5px rgba(0,0,0,0.7);
      letter-spacing: 0.5px;
    }
    .slot .avatar {
      width: 100%; aspect-ratio: 1/1; border-radius: 14px; overflow: hidden;
      background: #0d1017; box-shadow: 0 6px 22px rgba(0,0,0,0.55);
      border: 3px solid #fff;
    }
    .slot .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .slot .avatar .empty { width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#556; font-size:13px; }
    .slot .nameplate {
      margin-top: 8px; padding: 5px 14px; border-radius: 8px; font-weight: 800;
      white-space: nowrap; line-height: 1.15; text-shadow: 0 2px 6px rgba(0,0,0,0.75);
    }
  </style>
</head>
<body>
  <div id="stage"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    // ===== 선수 오버레이 v4 (포지션 배지: 사진 위 포지션 / 아래 이름) =====
    // 코트 번호: URL 뒤에 ?court=2 붙이면 2코트. 기본 1.
    const courtNumber = new URLSearchParams(location.search).get('court') || '1';
    const courtPath = 'court' + courtNumber;

    const firebaseConfig = {
      apiKey: "AIzaSyAOIaiDKckDVDvDKe9qPURRWQqIsA7f1bs",
      authDomain: "scoreboard-3681d.firebaseapp.com",
      databaseURL: "https://scoreboard-3681d-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "scoreboard-3681d",
      storageBucket: "scoreboard-3681d.firebasestorage.app",
      messagingSenderId: "466288006612",
      appId: "1:466288006612:web:01d167367672c72a73b241"
    };
    firebase.initializeApp(firebaseConfig);
    const playersRef = firebase.database().ref(courtPath + '/players');

    const DEFAULT_STYLE = { x:50, y:70, size:150, font:22, family:"'Noto Sans KR',sans-serif", textColor:'#ffffff', plateColor:'#0a0c11', plateAlpha:62, borderColor:'#ffffff' };
    // 포지션(슬롯 고정): 좌0~3, 우4~7
    const POS_NAME = ['우수비','좌수비','세터','공격수', '공격수','세터','좌수비','우수비'];
    const stage = document.getElementById('stage');
    let els = []; // 8개 슬롯 DOM 캐시

    // 슬롯 DOM 8개를 미리 생성 (재생성 안 하고 갱신만 → 깜빡임 없음)
    for (let i = 0; i < 8; i++) {
      const el = document.createElement('div');
      el.className = 'slot';
      el.innerHTML = `<div class="posbadge"></div><div class="avatar"><img alt=""><div class="empty" style="display:none"></div></div><div class="nameplate"></div>`;
      stage.appendChild(el);
      els.push({
        root: el,
        badge: el.querySelector('.posbadge'),
        avatar: el.querySelector('.avatar'),
        img: el.querySelector('img'),
        empty: el.querySelector('.empty'),
        plate: el.querySelector('.nameplate'),
        lastPhoto: null
      });
    }

    function hexToRgba(hex, alpha){
      const h = (hex||'#000000').replace('#','');
      const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
      return `rgba(${r},${g},${b},${(alpha==null?100:alpha)/100})`;
    }

    playersRef.on('value', snap => {
      const data = snap.val() || {};
      const roster = data.roster || {};
      const slots = (data.slots && data.slots.length === 8) ? data.slots : [];

      for (let i = 0; i < 8; i++) {
        const e = els[i];
        const s = slots[i];
        if (!s || !s.visible || !s.playerId) { e.root.classList.remove('on'); continue; }

        const p = roster[s.playerId];
        const st = { ...DEFAULT_STYLE, ...(s.style || {}) };

        // 위치/크기
        e.root.style.left = st.x + '%';
        e.root.style.top = st.y + '%';
        e.root.style.width = st.size + 'px';
        e.avatar.style.borderColor = st.borderColor;

        // 사진 (URL이 같으면 다시 로드하지 않음 → 캐시 유지, 깜빡임 없음)
        const photo = p && p.photo ? p.photo : '';
        if (photo !== e.lastPhoto) {
          e.lastPhoto = photo;
          if (photo) { e.img.src = photo; e.img.style.display = 'block'; e.empty.style.display = 'none'; }
          else { e.img.removeAttribute('src'); e.img.style.display = 'none'; e.empty.style.display = 'flex'; e.empty.textContent = p ? p.name : ''; }
        }

        // 포지션 배지 (사진 위, 슬롯 고정)
        e.badge.textContent = POS_NAME[i];
        e.badge.style.fontSize = Math.round(st.font * 0.72) + 'px';
        e.badge.style.color = st.textColor;
        e.badge.style.fontFamily = st.family;
        e.badge.style.background = hexToRgba(st.plateColor, st.plateAlpha);

        // 이름표 (사진 아래)
        e.plate.textContent = p ? (p.name || '') : '';
        e.plate.style.fontSize = st.font + 'px';
        e.plate.style.color = st.textColor;
        e.plate.style.fontFamily = st.family;
        e.plate.style.background = hexToRgba(st.plateColor, st.plateAlpha);

        e.root.classList.add('on');
      }
    });
  </script>
</body>
</html>
