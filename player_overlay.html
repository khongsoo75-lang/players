<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선수 오버레이</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Jua&family=Nanum+Gothic:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=Anton&family=Archivo+Black&family=Teko:wght@600;700&family=Gothic+A1:wght@700;800;900&family=Song+Myung&family=Nanum+Myeongjo:wght@700;800&family=Poor+Story&family=Gugi&family=Bagel+Fat+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
    #stage { position: fixed; inset: 0; }
    .slot {
      position: absolute;
      display: flex; flex-direction: column; align-items: center;
      /* 등장: 팀명·VS와 동일한 페이드 + 살짝 떠오름.
         transition-delay는 JS에서 슬롯별로 줘서 안쪽(공격수)부터 차례로 등장시킨다. */
      opacity: 0;
      transform: translate(-50%, calc(-50% + 10px));
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: opacity, transform;
    }
    .slot.on { opacity: 1; transform: translate(-50%, -50%); }
    .slot .posbadge {
      margin-bottom: 6px; padding: 3px 12px; border-radius: 6px; font-weight: 800;
      white-space: nowrap; line-height: 1.1; text-shadow: 0 2px 5px rgba(0,0,0,0.7);
      letter-spacing: 0.5px;
    }
    .slot .avatar {
      width: 100%; aspect-ratio: 1/1; border-radius: 14px; overflow: hidden;
      background: #0d1017; box-shadow: 0 6px 22px rgba(0,0,0,0.55);
      border: 3px solid #fff;
    }
    /* 사진 2장을 겹쳐놓고 서로 페이드 = 교체 시 크로스페이드.
       평소엔 앞 레이어만 보이므로 동작에 영향 없음. */
    .slot .avatar { position: relative; }
    .slot .avatar img.ph {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover; display: block;
      opacity: 0; transition: opacity 0.6s ease;
    }
    .slot .avatar img.ph.front { opacity: 1; }
    /* IN 배지 — 교체된 순간에만 잠깐 */
    .slot .avatar .swapbadge {
      position: absolute; top: 6px; left: 50%;
      transform: translate(-50%, -14px);
      background: #16c60c; color: #fff;
      font-size: 13px; font-weight: 900; letter-spacing: 1px;
      padding: 2px 10px; border-radius: 20px;
      box-shadow: 0 2px 10px rgba(0,0,0,.5);
      opacity: 0; transition: opacity .35s ease, transform .35s cubic-bezier(0.16,1,0.3,1);
      pointer-events: none;
    }
    .slot .avatar .swapbadge.on { opacity: 1; transform: translate(-50%, 0); }
    /* 교체된 슬롯 강조 — 테두리가 잠깐 빛남 */
    .slot .avatar.swapping {
      box-shadow: 0 0 0 4px #16c60c, 0 6px 22px rgba(0,0,0,0.55);
      transition: box-shadow .35s ease;
    }
    .slot .avatar .empty { width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#556; font-size:13px; }
    .slot .nameplate {
      margin-top: 8px; padding: 5px 14px; border-radius: 8px; font-weight: 800;
      white-space: nowrap; line-height: 1.15; text-shadow: 0 2px 6px rgba(0,0,0,0.75);
    }
    .gtitle {
      position: absolute;
      transform: translate(-50%, -100%);
      padding: 6px 22px; border-radius: 10px; font-weight: 800;
      white-space: nowrap; line-height: 1.15; text-shadow: 0 2px 6px rgba(0,0,0,0.75);
      display: flex; flex-direction: column; align-items: center;
      /* 등장: 0.5초 페이드 + 아래에서 살짝 떠오름 (순수 페이드보다 자연스럽고 고급스러움).
         cubic-bezier는 처음 빠르고 끝에서 부드럽게 감속 = 방송 그래픽 특유의 느낌 */
      opacity: 0;
      transform: translate(-50%, calc(-100% + 10px));
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: opacity, transform;
    }
    .gtitle.on { opacity: 1; transform: translate(-50%, -100%); }
    /* 밑줄 모드: 배경 없이 글자 아래 선만. 글자 세로 정렬이 어긋나지 않도록 padding으로 잡음 */
    .gtitle.underline { background: none !important; border: none !important; padding: 0; border-radius: 0; }
    .gtitle .gt-line { margin-top: 4px; width: 100%; border-radius: 2px; }

    /* 가운데 VS — 화면 정중앙 고정 */
    #vsMark {
      position: absolute; left: 50%; top: 50%;
      font-weight: 900; line-height: 1; white-space: nowrap;
      pointer-events: none;
      /* 팀명과 동일한 등장 방식 (페이드 + 살짝 떠오름) */
      opacity: 0;
      transform: translate(-50%, calc(-50% + 10px));
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: opacity, transform;
    }
    #vsMark.on { opacity: 1; transform: translate(-50%, -50%); }
  </style>
</head>
<body>
  <div id="stage">
    <div class="gtitle" id="gtitleLeft"></div>
    <div class="gtitle" id="gtitleRight"></div>
    <div id="vsMark"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    // ===== 선수 오버레이 v4 (포지션 배지: 사진 위 포지션 / 아래 이름) =====
    // 코트 번호: URL 뒤에 ?court=2 붙이면 2코트. 기본 1.
    const courtNumber = new URLSearchParams(location.search).get('court') || '1';
    const courtPath = 'court' + courtNumber;

    const firebaseConfig = {
      apiKey: "AIzaSyAOIaiDKckDVDvDKe9qPURRWQqIsA7f1bs",
      authDomain: "scoreboard-3681d.firebaseapp.com",
      databaseURL: "https://scoreboard-3681d-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "scoreboard-3681d",
      storageBucket: "scoreboard-3681d.firebasestorage.app",
      messagingSenderId: "466288006612",
      appId: "1:466288006612:web:01d167367672c72a73b241"
    };
    firebase.initializeApp(firebaseConfig);
    // 어드민 저장 구조에 맞춤:
    //   shared            → roster(명단)/teams  (모든 코트 공용)
    //   court{N}/players  → slots/titles/layout (코트별)
    // 둘 다 구독해서 합쳐 렌더한다. (예전 구조: court{N}/players 안에 roster가 있던 것도 지원)
    const playersRef = firebase.database().ref(courtPath + '/players');
    const sharedRef  = firebase.database().ref('shared');

    const DEFAULT_STYLE = { x:50, y:70, size:150, font:22, family:"'Noto Sans KR',sans-serif", textColor:'#ffffff', plateColor:'#0a0c11', plateAlpha:62, borderColor:'#ffffff' };
    // 포지션(슬롯 고정): 좌0~3, 우4~7
    const POS_NAME = ['우수비','좌수비','세터','공격수', '공격수','세터','좌수비','우수비'];
    const stage = document.getElementById('stage');
    const titleEls = { left: document.getElementById('gtitleLeft'), right: document.getElementById('gtitleRight') };
    const vsEl = document.getElementById('vsMark');
    let els = []; // 8개 슬롯 DOM 캐시

    // 슬롯 DOM 8개를 미리 생성 (재생성 안 하고 갱신만 → 깜빡임 없음)
    for (let i = 0; i < 8; i++) {
      const el = document.createElement('div');
      el.className = 'slot';
      el.innerHTML = `<div class="posbadge"></div><div class="avatar"><img class="ph ph-a" alt=""><img class="ph ph-b" alt=""><div class="empty" style="display:none"></div><div class="swapbadge">IN</div></div><div class="nameplate"></div>`;
      stage.appendChild(el);
      els.push({
        root: el,
        badge: el.querySelector('.posbadge'),
        avatar: el.querySelector('.avatar'),
        imgA: el.querySelector('.ph-a'),
        imgB: el.querySelector('.ph-b'),
        swapBadge: el.querySelector('.swapbadge'),
        empty: el.querySelector('.empty'),
        plate: el.querySelector('.nameplate'),
        lastPhoto: null,
        lastPlayerId: null,   // 선수가 바뀌었는지 감지용
        frontIsA: true,       // 지금 앞에 보이는 레이어
        swapTimer: null
      });
    }

    function hexToRgba(hex, alpha){
      const h = (hex||'#000000').replace('#','');
      const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
      return `rgba(${r},${g},${b},${(alpha==null?100:alpha)/100})`;
    }

    // 두 경로의 최신 값을 보관했다가 합쳐서 렌더
    let courtData = {}, sharedData = {};
    let gotCourt = false, gotShared = false;
    playersRef.on('value', snap => { courtData = snap.val() || {}; gotCourt = true; render(); });
    sharedRef.on('value',  snap => { sharedData = snap.val() || {}; gotShared = true; render(); });

    function render(){
      // 둘 다 도착하기 전엔 그리지 않음 (사진 없는 빈 칸이 깜빡이는 것 방지)
      if (!gotCourt || !gotShared) return;
      const data = courtData;
      // 명단은 shared 우선, 없으면 예전 구조(court 안의 roster) 사용
      const roster = (sharedData.roster && Object.keys(sharedData.roster).length)
                     ? sharedData.roster
                     : (data.roster || {});
      const slots = (data.slots && data.slots.length === 8) ? data.slots : [];

      for (let i = 0; i < 8; i++) {
        const e = els[i];
        const s = slots[i];
        if (!s || !s.visible || !s.playerId) {
          e.root.style.transitionDelay = '0ms';
          e.root.classList.remove('on');
          // 숨겨진 슬롯은 교체 추적 초기화 → 다시 켤 때 교체로 오인하지 않음
          e.lastPlayerId = null;
          clearTimeout(e.swapTimer);
          e.swapBadge.classList.remove('on');
          e.avatar.classList.remove('swapping');
          continue;
        }

        const p = roster[s.playerId];
        const st = { ...DEFAULT_STYLE, ...(s.style || {}) };

        // 위치/크기
        e.root.style.left = st.x + '%';
        e.root.style.top = st.y + '%';
        e.root.style.width = st.size + 'px';
        e.avatar.style.borderColor = st.borderColor;

        // ===== 사진 + 선수 교체 감지 =====
        // 같은 슬롯인데 playerId가 바뀌면 = 교체. 사진을 뒤 레이어에 넣고 크로스페이드.
        // 첫 등장(lastPlayerId===null)은 교체가 아니므로 조용히 표시만 한다.
        const photo = p && p.photo ? p.photo : '';
        const isSwap = (e.lastPlayerId !== null && e.lastPlayerId !== s.playerId);

        if (photo !== e.lastPhoto) {
          e.lastPhoto = photo;
          const front = e.frontIsA ? e.imgA : e.imgB;
          const back  = e.frontIsA ? e.imgB : e.imgA;

          if (!photo) {
            // 사진 없음 → 이름만
            e.imgA.classList.remove('front'); e.imgB.classList.remove('front');
            e.empty.style.display = 'flex'; e.empty.textContent = p ? p.name : '';
          } else if (isSwap) {
            // 교체: 새 사진을 뒤 레이어에 로드 → 로드 완료 후 앞뒤 전환 (부드럽게 교차)
            e.empty.style.display = 'none';
            back.onload = () => {
              back.classList.add('front');
              front.classList.remove('front');
              e.frontIsA = !e.frontIsA;
            };
            back.src = photo;
            if (back.complete && back.naturalWidth) back.onload();   // 캐시된 이미지 대응

            // IN 배지 + 슬롯 강조 (2.5초 후 자동으로 사라짐)
            clearTimeout(e.swapTimer);
            e.swapBadge.classList.add('on');
            e.avatar.classList.add('swapping');
            e.swapTimer = setTimeout(() => {
              e.swapBadge.classList.remove('on');
              e.avatar.classList.remove('swapping');
            }, 2500);
          } else {
            // 첫 등장·사진만 교체: 애니메이션 없이 앞 레이어에 바로
            e.empty.style.display = 'none';
            front.src = photo;
            front.classList.add('front');
          }
        }
        e.lastPlayerId = s.playerId;

        // 포지션 배지 (사진 위, 슬롯 고정)
        e.badge.textContent = POS_NAME[i];
        e.badge.style.fontSize = Math.round(st.font * 0.72) + 'px';
        e.badge.style.color = st.textColor;
        e.badge.style.fontFamily = st.family;
        e.badge.style.background = hexToRgba(st.plateColor, st.plateAlpha);

        // 이름표 (사진 아래)
        e.plate.textContent = p ? (p.name || '') : '';
        e.plate.style.fontSize = st.font + 'px';
        e.plate.style.color = st.textColor;
        e.plate.style.fontFamily = st.family;
        e.plate.style.background = hexToRgba(st.plateColor, st.plateAlpha);

        // 순차 등장: 이 슬롯이 "새로 나타나는" 순간에만 딜레이를 주고,
        // 이미 떠 있는 상태에서의 조절(슬라이더 등)에는 딜레이 0 → 반응이 즉각적.
        const wasOn = e.root.classList.contains('on');
        if (!wasOn) {
          const distFromCenter = (i < 4) ? (3 - i) : (i - 4);  // 3,4→0 / 2,5→1 / 1,6→2 / 0,7→3
          e.root.style.transitionDelay = (distFromCenter * 80) + 'ms';
        } else {
          e.root.style.transitionDelay = '0ms';
        }
        e.root.classList.add('on');
      }

      // ===== 그룹 팀명 (각 그룹 상단 중앙) =====
      const titles = data.titles || {};
      const commonStyle = { ...DEFAULT_STYLE, ...((slots[0] && slots[0].style) || {}) };
      renderTitle('left',  [0,1,2,3], slots, roster, titles.left,  commonStyle, titles.autoMode);
      renderTitle('right', [4,5,6,7], slots, roster, titles.right, commonStyle, titles.autoMode);
      renderVS(data.vs, commonStyle);
    }

    function renderTitle(side, idxs, slots, roster, cfg, st, autoMode){
      const el = titleEls[side];
      cfg = cfg || {};
      // 팀명 우선순위: ① 수동 입력이 항상 최우선
      //               ② 자동 모드: 'player'=공격수 이름+"팀"(동네운동) / 'team'=배정한 팀 이름(시합)
      // 공격수 슬롯: 좌측=3, 우측=4 (둘 다 중앙에서 마주봄)
      const autoM = autoMode || 'player';
      const atkIdx = (side === 'left') ? 3 : 4;
      const atk = slots[atkIdx];
      const atkName = (atk && atk.visible && atk.playerId && roster[atk.playerId])
                      ? (roster[atk.playerId].name || '').trim() : '';
      const autoFromAtk = atkName ? (atkName + '팀') : '';
      const autoFromTeam = (cfg.auto || '').trim();
      const autoText = (autoM === 'team') ? (autoFromTeam || autoFromAtk) : (autoFromAtk || autoFromTeam);
      const text = (cfg.text && cfg.text.trim()) || autoText;
      // 이 그룹에서 실제로 보이는 슬롯만 대상
      const shown = idxs.filter(i => {
        const s = slots[i];
        return s && s.visible && s.playerId && roster[s.playerId];
      });
      if (!cfg.show || !text || shown.length === 0) { el.style.transitionDelay='0ms'; el.classList.remove('on'); return; }

      // 그룹 가로 중앙 = 보이는 슬롯 x의 (min+max)/2, 상단 = 최소 y에서 사진 절반만큼 위
      let minX = 100, maxX = 0, minY = 100, sizeAtTop = st.size;
      shown.forEach(i => {
        const s = { ...DEFAULT_STYLE, ...(slots[i].style || {}) };
        if (s.x < minX) minX = s.x;
        if (s.x > maxX) maxX = s.x;
        if (s.y < minY) { minY = s.y; sizeAtTop = s.size; }
      });
      const cx = (minX + maxX) / 2;
      // 사진 위쪽 경계 = y% - (사진높이 절반). 사진높이는 px이므로 화면높이 비율로 변환.
      const stageH = stage.clientHeight || (window.innerHeight || 1080);
      const halfPhotoPct = ((sizeAtTop / 2) / stageH) * 100;
      // 포지션 배지(우수비 등)가 사진 위에 있으므로 그 높이만큼은 항상 비켜줌
      const badgeH = st.font * 0.72;           // 배지 글자크기
      const badgePad = 6 + 6;                   // 배지 상하 패딩+아래 여백(대략)
      const badgeBlockPct = ((badgeH + badgePad) / stageH) * 100;
      // 사용자 조절 간격 (기본 12px) — 배지 위에서 팀명까지 추가 거리
      const userGapPx = (cfg.gap != null ? cfg.gap : 12);
      const userGapPct = (userGapPx / stageH) * 100;
      const topY = minY - halfPhotoPct - badgeBlockPct - userGapPct;

      // 팀명 전용 스타일 (없으면 공통 스타일 fallback) — 어드민 미리보기와 동일 규칙
      const tFont     = (cfg.font != null ? cfg.font : Math.round(st.font * 1.25));
      const tFamily   = (cfg.family || st.family);
      const tColor    = (cfg.color || st.textColor);
      const titleBg   = (cfg.bg || st.plateColor);
      const titleAlpha= (cfg.bgAlpha != null ? cfg.bgAlpha : st.plateAlpha);
      const tBorder   = (cfg.border || st.borderColor);
      const tWeight   = (cfg.weight != null ? cfg.weight : 800);
      const tItalic   = !!cfg.italic;
      const mode      = (cfg.mode || 'box');            // 'box' | 'underline'
      const lineW     = (cfg.lineW != null ? cfg.lineW : 4);

      // 글자 요소 + (밑줄 모드면) 선 요소
      el.innerHTML = '';
      const span = document.createElement('span');
      span.textContent = text;
      // line-height를 넉넉히 줘서 한글 받침이 잘리거나 위로 쏠리지 않게 (세로 중앙 정렬 문제 해결)
      span.style.lineHeight = '1.3';
      span.style.display = 'block';
      el.appendChild(span);

      el.style.left = cx + '%';
      el.style.top = topY + '%';
      el.style.fontSize = tFont + 'px';
      el.style.color = tColor;
      el.style.fontFamily = tFamily;
      el.style.fontWeight = tWeight;
      el.style.fontStyle = tItalic ? 'italic' : 'normal';

      if (mode === 'underline') {
        el.classList.add('underline');
        const line = document.createElement('div');
        line.className = 'gt-line';
        line.style.height = lineW + 'px';
        line.style.background = tColor;      // 밑줄은 글자색과 동일
        el.appendChild(line);
      } else {
        el.classList.remove('underline');
        el.style.background = hexToRgba(titleBg, titleAlpha);
        el.style.border = '2px solid ' + tBorder;
      }
      // 팀명은 선수들이 다 등장한 뒤(약 0.34초)에 나타나야 자연스러움. 이미 떠 있으면 딜레이 없음.
      el.style.transitionDelay = el.classList.contains('on') ? '0ms' : '340ms';
      el.classList.add('on');
    }

    // ===== 가운데 VS =====
    function renderVS(vs, st){
      const el = vsEl;
      vs = vs || {};
      if (!vs.show) { el.style.transitionDelay='0ms'; el.classList.remove('on'); return; }
      el.textContent = (vs.text || 'VS');
      el.style.fontSize = (vs.size != null ? vs.size : 90) + 'px';
      el.style.color = (vs.color || '#ffffff');
      el.style.fontFamily = (vs.family || st.family);
      el.style.fontWeight = (vs.weight != null ? vs.weight : 900);
      el.style.fontStyle = vs.italic ? 'italic' : 'normal';
      // 테두리(외곽선) — 심플하게 글자 주변 스트로크
      const ow = (vs.outline != null ? vs.outline : 3);
      const oc = (vs.outlineColor || '#000000');
      el.style.webkitTextStroke = ow > 0 ? (ow + 'px ' + oc) : '';
      el.style.textShadow = '0 4px 14px rgba(0,0,0,0.6)';
      // VS는 팀명보다 조금 더 뒤에 = 마지막에 등장 (선수 → 팀명 → VS 순서로 완성)
      el.style.transitionDelay = el.classList.contains('on') ? '0ms' : '520ms';
      el.classList.add('on');
    }
  </script>
</body>
</html>
